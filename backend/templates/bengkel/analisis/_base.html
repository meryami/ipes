<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>{% block title %}Analisis Situasi{% endblock %} — NDHB</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Inter",sans-serif;background:#f5f7fa;color:#1e293b;min-height:100vh}
    .card{background:#fff;border:1px solid #e8ecf0;border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
    .field-group{background:#f8fafc;border:1.5px solid #e8ecf0;border-radius:12px;padding:18px;margin-bottom:14px;transition:border-color .15s}
    .field-group:focus-within{border-color:var(--accent,#2563eb)}
    .field-label{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--accent,#2563eb);margin-bottom:5px;display:flex;align-items:center;gap:6px}
    .field-hint{font-size:12px;color:#94a3b8;margin-bottom:10px;line-height:1.5}
    textarea{width:100%;border:none;background:transparent;resize:vertical;font-size:13.5px;color:#1e293b;font-family:inherit;outline:none;min-height:88px;line-height:1.6}
    .tbtn{display:inline-flex;align-items:center;gap:7px;padding:11px 22px;border-radius:10px;font-size:13px;font-weight:700;text-decoration:none;transition:opacity .15s;cursor:pointer;border:none}
    .tbtn:hover{opacity:.88}
    .rec-card{background:#fff;border:1px solid #e8ecf0;border-radius:14px;padding:16px 18px}
    .rec-label{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#94a3b8;margin-bottom:3px}
    .rec-value{font-size:12.5px;color:#334155;line-height:1.55;white-space:pre-wrap}

    /* Responsive 2-col */
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start}
    @media(max-width:700px){.two-col{grid-template-columns:1fr}}
  </style>
</head>
<body>

<!-- Top bar -->
<div style="background:#fff;border-bottom:1px solid #e8ecf0;position:sticky;top:0;z-index:50">
  <div style="max-width:920px;margin:0 auto;padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between">
    <div style="display:flex;align-items:center;gap:12px">
      <a href="{% url 'bengkel:dashboard' %}" style="display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:#64748b;text-decoration:none;padding:6px 10px;border-radius:8px;transition:.15s" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='transparent'">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        Dashboard
      </a>
      <div style="width:1px;height:20px;background:#e8ecf0"></div>
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:28px;height:28px;border-radius:8px;background:{% block accent_bg %}#2563eb{% endblock %};display:flex;align-items:center;justify-content:center">
          {% block topbar_icon %}
          <svg width="14" height="14" fill="none" stroke="#fff" stroke-width="2.2" viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="8" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/></svg>
          {% endblock %}
        </div>
        <span style="font-size:13.5px;font-weight:700;color:#0f172a">{% block tool_name %}Analisis{% endblock %}</span>
        <span style="font-size:10.5px;font-weight:700;color:{% block accent_color %}#2563eb{% endblock %};background:{% block accent_light %}#dbeafe{% endblock %};border-radius:99px;padding:2px 10px">{% block tool_tag %}ALAT ANALITIK{% endblock %}</span>
      </div>
    </div>
    <span style="font-size:12px;color:#94a3b8">{{ user.get_full_name|default:user.username }}</span>
  </div>
</div>

<div style="max-width:920px;margin:0 auto;padding:28px 24px 60px">

  {% if messages %}
  <div style="margin-bottom:20px">
    {% for m in messages %}
    <div style="padding:12px 16px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:6px;{% if m.tags == 'success' %}background:#dcfce7;color:#166534;border:1px solid #bbf7d0{% else %}background:#fee2e2;color:#b91c1c;border:1px solid #fecaca{% endif %}">{{ m }}</div>
    {% endfor %}
  </div>
  {% endif %}

  {% block content %}{% endblock %}

</div>
</body>
</html>
